<!DOCTYPE html>
<html>
<head>
    <title>Mi App Docker PRO</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            text-align: center;
            padding-top: 50px;
        }
        .card {
            background: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 15px;
            display: inline-block;
        }
        table {
            margin: auto;
            margin-top: 20px;
            border-collapse: collapse;
        }
        td, th {
            padding: 10px;
            border: 1px solid white;
        }
    </style>
</head>
<body>

<div class="card">
    <h1> Usuarios en MySQL</h1>

    <table>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
        </tr>

        {% for u in usuarios %}
        <tr>
            <td>{{ u[0] }}</td>
            <td>{{ u[1] }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
